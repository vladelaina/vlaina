name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: build-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    name: Build renderer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-version-from-tag.mjs "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"

      - name: Build renderer
        run: pnpm build

      - name: Cache renderer build output
        uses: actions/cache/save@v4
        with:
          path: dist
          key: renderer-dist-${{ github.run_id }}-${{ github.run_attempt }}
          enableCrossOsArchive: true

  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs:
      - test
      - build

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: --win
          - os: macos-latest
            platform: macos
            target: --mac
          - os: ubuntu-latest
            platform: linux
            target: --linux

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-version-from-tag.mjs "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"

      - name: Restore renderer build output
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: renderer-dist-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore Electron build caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-builder-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Generate desktop icons
        run: pnpm run prepare:desktop-assets

      - name: Package Electron app
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm exec electron-builder --config electron-builder.yml ${{ matrix.target }} --publish never

      - name: Upload Windows NSIS installer
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-nsis-run-${{ github.run_number }}
          path: release/*-setup.exe
          if-no-files-found: error

      - name: Upload Windows portable app
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-portable-run-${{ github.run_number }}
          path: release/*-portable.exe
          if-no-files-found: error

      - name: Upload macOS DMG
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-dmg-run-${{ github.run_number }}
          path: release/*.dmg
          if-no-files-found: error

      - name: Upload macOS ZIP
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-zip-run-${{ github.run_number }}
          path: release/*.zip
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-appimage-run-${{ github.run_number }}
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload Linux DEB
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-deb-run-${{ github.run_number }}
          path: release/*.deb
          if-no-files-found: error

      - name: Upload Linux tar.gz
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-tar-gz-run-${{ github.run_number }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: package

    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: vlaina ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
