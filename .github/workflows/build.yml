name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: build-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            target: --win
          - os: macos-latest
            platform: macos
            target: --mac
          - os: ubuntu-latest
            platform: linux
            target: --linux

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-version-from-tag.mjs "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"

      - name: Build renderer
        run: pnpm build

      - name: Generate desktop icons
        run: pnpm run prepare:desktop-assets

      - name: Package Electron app
        run: pnpm exec electron-builder --config electron-builder.yml ${{ matrix.target }} --publish never

      - name: Upload Windows NSIS installer
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-nsis
          path: release/*.exe
          if-no-files-found: error

      - name: Upload Windows blockmap
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-blockmap
          path: release/*.exe.blockmap
          if-no-files-found: error

      - name: Upload Windows update metadata
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-latest-yml
          path: release/latest*.yml
          if-no-files-found: error

      - name: Upload macOS DMG
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-dmg
          path: release/*.dmg
          if-no-files-found: error

      - name: Upload macOS DMG blockmap
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-dmg-blockmap
          path: release/*.dmg.blockmap
          if-no-files-found: error

      - name: Upload macOS ZIP
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-zip
          path: release/*.zip
          if-no-files-found: error

      - name: Upload macOS ZIP blockmap
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-zip-blockmap
          path: release/*.zip.blockmap
          if-no-files-found: error

      - name: Upload macOS update metadata
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-latest-yml
          path: release/latest*.yml
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-appimage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload Linux DEB
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-deb
          path: release/*.deb
          if-no-files-found: error

      - name: Upload Linux tar.gz
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-tar-gz
          path: release/*.tar.gz
          if-no-files-found: error

      - name: Upload Linux update metadata
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-latest-yml
          path: release/latest*.yml
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
