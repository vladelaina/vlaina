name: Publish Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to publish, for example 0.1.0. A leading v is optional."
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_version || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  release-context:
    name: Resolve release version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release
        env:
          RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || github.ref_name }}
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          if [[ "$IS_RELEASE" != "true" ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="${RELEASE_INPUT#"${RELEASE_INPUT%%[![:space:]]*}"}"
          version="${version%"${version##*[![:space:]]}"}"
          version="${version#[vV]}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported app version: $RELEASE_INPUT" >&2
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  typecheck:
    runs-on: windows-2025-vs2026
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test shard ${{ matrix.shard }}
    runs-on: windows-2025-vs2026
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard:
          - 1/4
          - 2/4
          - 3/4
          - 4/4

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run --shard=${{ matrix.shard }}

  build:
    name: Build renderer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: release-context

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-version-from-tag.mjs "${{ needs.release-context.outputs.tag }}"

      - name: Build renderer
        run: pnpm build

      - name: Cache renderer build output
        uses: actions/cache/save@v5
        with:
          path: dist
          key: renderer-dist-${{ github.run_id }}-${{ github.run_attempt }}
          enableCrossOsArchive: true

  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs:
      - typecheck
      - test
      - build
      - release-context

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025-vs2026
            label: windows-x64
            platform: windows
            arch: x64
            target: --win --x64
          - os: windows-2025-vs2026
            label: windows-arm64
            platform: windows
            arch: arm64
            target: --win --arm64
          - os: macos-15-intel
            label: macos-x64
            platform: macos
            arch: x64
            target: --mac --x64
          - os: macos-15
            label: macos-arm64
            platform: macos
            arch: arm64
            target: --mac --arm64
          - os: ubuntu-24.04
            label: linux-x64
            platform: linux
            arch: x64
            target: --linux --x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            platform: linux
            arch: arm64
            target: --linux --arm64

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package version from tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-version-from-tag.mjs "${{ needs.release-context.outputs.tag }}"

      - name: Restore renderer build output
        uses: actions/cache/restore@v5
        with:
          path: dist
          key: renderer-dist-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore Electron build caches
        uses: actions/cache@v5
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-builder-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install ImageMagick on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install ImageMagick on macOS
        if: runner.os == 'macOS'
        run: brew install imagemagick

      - name: Install ImageMagick on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command magick -ErrorAction SilentlyContinue)) {
            choco install imagemagick -y --no-progress
          }

      - name: Generate desktop icons
        run: pnpm run prepare:desktop-assets

      - name: Package Electron app
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
        run: pnpm exec electron-builder --config electron-builder.yml ${{ matrix.target }} --publish never

      - name: Upload Windows NSIS installer
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-nsis-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

      - name: Upload Windows portable app
        if: success() && matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-windows-portable-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*-windows-${{ matrix.arch }}-portable.exe
          if-no-files-found: error

      - name: Upload macOS DMG
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-dmg-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Upload macOS ZIP
        if: success() && matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-macos-zip-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-appimage-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload Linux DEB
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-deb-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*.deb
          if-no-files-found: error

      - name: Upload Linux tar.gz
        if: success() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: vlaina-linux-tar-gz-${{ matrix.arch }}-run-${{ github.run_number }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - package
      - release-context
    concurrency:
      group: publish-release-assets-${{ needs.release-context.outputs.tag }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-context.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: vlaina ${{ needs.release-context.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.release-context.outputs.tag, '-') }}
          generate_release_notes: true
          overwrite_files: true
          files: release-artifacts/*
