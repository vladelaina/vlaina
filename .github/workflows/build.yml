name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win
            artifact_name: vlaina-installers-windows
            artifact_path: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml
          - os: macos-latest
            target: --mac
            artifact_name: vlaina-installers-macos
            artifact_path: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml
          - os: ubuntu-latest
            target: --linux
            artifact_name: vlaina-installers-linux
            artifact_path: |
              release/*.AppImage
              release/*.tar.gz
              release/*.deb
              release/latest*.yml

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Generate desktop icons
        run: pnpm run prepare:desktop-assets

      - name: Package Electron app
        run: pnpm exec electron-builder --config electron-builder.yml ${{ matrix.target }} --publish never

      - name: Upload installer artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
