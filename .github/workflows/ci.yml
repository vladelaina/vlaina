name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  CI: true
  NODE_VERSION: "24"
  PNPM_VERSION: "10.11.1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  web-quality:
    name: Web Quality Gate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run root quality gate
        run: pnpm run quality:gate

  rust-quality:
    name: Rust Quality Gate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  build:
    name: Desktop Build (${{ matrix.name }})
    needs:
      - dependency-audit
      - web-quality
      - rust-quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            tauri_args: ""
            bundle_path: src-tauri/target/release/bundle
          - name: macos-universal
            runner: macos-latest
            tauri_args: "--target universal-apple-darwin"
            bundle_path: src-tauri/target/universal-apple-darwin/release/bundle
          - name: linux-x64
            runner: ubuntu-22.04
            tauri_args: ""
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current time
        id: date
        shell: bash
        run: echo "timestamp=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Install Rust stable for macOS universal
        if: matrix.name == 'macos-universal'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust stable
        if: matrix.name != 'macos-universal'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vlaina-${{ matrix.name }}-${{ steps.date.outputs.timestamp }}
          path: ${{ matrix.bundle_path }}/**/*
          if-no-files-found: error

      - name: Upload Windows portable executable
        if: matrix.name == 'windows-x64'
        uses: actions/upload-artifact@v6
        with:
          name: vlaina-windows-x64-portable-${{ steps.date.outputs.timestamp }}
          path: src-tauri/target/release/*.exe
          if-no-files-found: error
