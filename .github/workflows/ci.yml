name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  CI: true
  NODE_VERSION: "24"
  PNPM_VERSION: "10.11.1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Web Quality Gate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run root quality gate
        run: pnpm run quality:gate

  api-quality:
    name: API Quality Gate
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Install API dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check API
        run: pnpm run check

      - name: Run API tests
        run: pnpm run test

  rust-quality:
    name: Rust Quality Gate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  build:
    name: Tauri Build (${{ matrix.platform }})
    needs:
      - web-quality
      - api-quality
      - rust-quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current time
        id: date
        shell: bash
        run: echo "timestamp=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@${PNPM_VERSION}
          pnpm --version

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}

      - name: Rename artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ts = "${{ steps.date.outputs.timestamp }}"
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if ($msi) { Rename-Item $msi.FullName "Vlaina-$ts.msi" }
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($exe) { Rename-Item $exe.FullName "Vlaina-$ts-Setup.exe" }
          if (Test-Path "src-tauri/target/release/Vlaina.exe") {
            Rename-Item "src-tauri/target/release/Vlaina.exe" "Vlaina-$ts-Portable.exe"
          }

      - name: Rename artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          ts="${{ steps.date.outputs.timestamp }}"
          cd src-tauri/target/release/bundle/dmg
          for f in *.dmg; do mv "$f" "Vlaina-$ts.dmg"; done

      - name: Rename artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          ts="${{ steps.date.outputs.timestamp }}"
          cd src-tauri/target/release/bundle/deb
          for f in *.deb; do mv "$f" "Vlaina-$ts.deb"; done
          cd ../appimage
          for f in *.AppImage; do mv "$f" "Vlaina-$ts.AppImage"; done

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: Vlaina-Windows-${{ steps.date.outputs.timestamp }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows portable
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: Vlaina-Windows-Portable-${{ steps.date.outputs.timestamp }}
          path: src-tauri/target/release/Vlaina-*-Portable.exe

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: Vlaina-macOS-${{ steps.date.outputs.timestamp }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v6
        with:
          name: Vlaina-Linux-${{ steps.date.outputs.timestamp }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
