name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CI: true
  NODE_VERSION: "24"
  PNPM_VERSION: "10.11.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            tauri_args: ""
            bundle_path: src-tauri/target/release/bundle
          - name: macos-universal
            runner: macos-latest
            tauri_args: "--target universal-apple-darwin"
            bundle_path: src-tauri/target/universal-apple-darwin/release/bundle
          - name: linux-x64
            runner: ubuntu-22.04
            tauri_args: ""
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable for macOS universal
        if: matrix.name == 'macos-universal'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        if: matrix.name != 'macos-universal'

      - name: Install dependencies (Ubuntu only)
        if: matrix.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'vlaina ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads
            - **Windows x64**: NSIS installer, MSI installer, portable executable
            - **macOS universal**: DMG bundle
            - **Linux x64**: AppImage, DEB, RPM
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vlaina-release-${{ matrix.name }}-${{ github.ref_name }}
          path: ${{ matrix.bundle_path }}/**/*
          if-no-files-found: error

      - name: Upload Windows portable executable
        if: matrix.name == 'windows-x64'
        uses: actions/upload-artifact@v6
        with:
          name: vlaina-release-windows-x64-portable-${{ github.ref_name }}
          path: src-tauri/target/release/*.exe
          if-no-files-found: error
