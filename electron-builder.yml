appId: com.vlaina.desktop
productName: vlaina
compression: maximum
npmRebuild: false
removePackageScripts: true
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/**
  - package.json
  - "!node_modules/**"
  - "!vendor/**"
  - "!dist/**/*.map"
  - "!electron/**/*.map"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/example/**"
  - "!**/examples/**"
  - "!**/.github/**"
asar: true
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  icon: build/icon.icns
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
nsis:
  artifactName: ${productName}-${version}-windows-${arch}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  differentialPackage: false
portable:
  artifactName: ${productName}-${version}-windows-${arch}-portable.${ext}
  requestExecutionLevel: user
linux:
  category: Utility
  icon: build/icon.png
  maintainer: vlaina <noreply@github.com>
  target:
    - AppImage
    - deb
    - tar.gz
