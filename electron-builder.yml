appId: com.vlaina.desktop
productName: vlaina
copyright: Copyright © 2026 vladelaina
compression: normal
beforeBuild: scripts/electron-builder-before-build.mjs
afterPack: scripts/electron-builder-after-pack.mjs
removePackageScripts: true
electronLanguages:
  - en-US
  - en-GB
  - zh-CN
  - zh_CN
  - zh-TW
  - zh_TW
  - ja
  - ko
  - fr
  - de
  - es
  - pt-BR
  - pt_BR
  - it
  - ru
  - tr
  - vi
  - id
  - th
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/**
  - package.json
  - "!node_modules/**"
  - "!vendor/**"
  - "!dist/404.html"
  - "!dist/_headers"
  - "!dist/_redirects"
  - "!dist/**/*.map"
  - "!electron/**/*.map"
  - "!electron/**/*.md"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/example/**"
  - "!**/examples/**"
  - "!**/.github/**"
asar: true
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
fileAssociations:
  - ext: md
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: markdown
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: mdown
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
  - ext: mkd
    name: Markdown Document
    description: Markdown Document
    mimeType: text/markdown
    role: Editor
mac:
  icon: build/icon.icns
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
nsis:
  artifactName: ${productName}-${version}-windows-${arch}-setup.${ext}
  oneClick: false
  useZip: false
  allowToChangeInstallationDirectory: true
  differentialPackage: false
  include: scripts/windows-installer.nsh
portable:
  artifactName: ${productName}-${version}-windows-${arch}-portable.${ext}
  requestExecutionLevel: user
linux:
  category: Utility
  icon: build/icon.png
  maintainer: vlaina <noreply@github.com>
  target:
    - AppImage
    - deb
    - tar.gz
appImage:
  compression: xz
