appId: com.vlaina.desktop
productName: vlaina
compression: maximum
npmRebuild: false
removePackageScripts: true
directories:
  output: release
files:
  - dist/**
  - electron/**
  - package.json
  - "!dist/**/*.map"
  - "!electron/**/*.map"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/example/**"
  - "!**/examples/**"
  - "!**/.github/**"
asar: true
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  target:
    - nsis
linux:
  category: Utility
  target:
    - AppImage
