packages:
  - '.'
  - 'vendor/milkdown/packages/*'
  - 'vendor/milkdown/packages/plugins/*'
  - 'vendor/milkdown/packages/integrations/react'
overrides:
  '@codemirror/autocomplete': 6.20.1
  '@codemirror/commands': 6.10.3
  '@codemirror/language': 6.12.3
  '@codemirror/lint': 6.9.5
  '@codemirror/search': 6.6.0
  '@codemirror/view': 6.43.1
  katex: 0.17.0
  lodash-es: 4.18.1
  react: 19.2.7
  react-dom: 19.2.7
onlyBuiltDependencies:
  - electron
  - esbuild
peerDependencyRules:
  allowedVersions:
    react: '^19.0.0'
supportedArchitectures:
  os:
    - current
    - linux
    - win32
  cpu:
    - current
    - x64
